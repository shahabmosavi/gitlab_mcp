name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e . ruff
      - name: Lint
        run: ruff check .
      - name: Smoke test (server loads and registers tools)
        env:
          GITLAB_TOKEN: dummy
        run: |
          python - <<'PY'
          import asyncio
          from gitlab_mcp.server import mcp
          tools = asyncio.run(mcp.list_tools())
          print(f"{len(tools)} tools registered")
          assert len(tools) >= 40, "expected the full tool set to register"
          PY

  docker:
    needs: test
    # Only publish images from the canonical repo on main or version tags.
    if: >-
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: docker
    # Only deploy from main, not from tags.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APP_PORT: ${{ vars.APP_PORT || 8077 }}
          IMAGE: ghcr.io/${{ github.repository }}:main
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ vars.SSH_PORT || 22 }}
          envs: GHCR_USER,GHCR_TOKEN,APP_PORT,IMAGE
          # The server is multi-tenant: no token is baked in. Each caller sends
          # their own X-GitLab-Token / X-GitLab-Url headers per request.
          script: |
            set -e
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            docker pull "$IMAGE"
            docker rm -f gitlab-mcp 2>/dev/null || true
            docker run -d --name gitlab-mcp --restart unless-stopped \
              -p "${APP_PORT}:8000" \
              -e MCP_TRANSPORT=streamable-http \
              "$IMAGE"
            docker image prune -f
